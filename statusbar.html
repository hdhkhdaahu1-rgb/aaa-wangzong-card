<!-- ═══ AAA建材王总翻新 状态栏 v2.0 ═══ -->
<!-- v2.0: 重写。修export语法错误/openModal alias崩溃/fixed弹窗截断/AI文本XSS；保留手机深色风格与全部功能 -->
<!-- 部署：托管到GitHub Pages，正则把 <StatusPlaceHolderImpl/> 替换成加载本HTML的iframe -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0d0d0f; }
  body {
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    padding: 8px;
    font-variant-numeric: tabular-nums;
  }
  .sb-container {
    position: relative;
    max-width: 480px;
    margin: 0 auto;
    background: #1a1a1e;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #2a2a30;
  }
  /* 顶部时间 */
  .sb-timebar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: linear-gradient(135deg, #1f1f25, #25252c);
    border-bottom: 1px solid #2a2a30;
    font-size: 13px;
  }
  .sb-timebar .date { color: #b8b8c0; }
  .sb-timebar .period {
    background: #2d2d35;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    color: #8a8a95;
  }
  .sb-timebar .day-count { color: #6a6a75; font-size: 11px; }
  /* 资产卡片 */
  .sb-money {
    margin: 10px;
    padding: 12px 14px;
    background: linear-gradient(135deg, #1e2a1e, #1a2520);
    border: 1px solid #2a3a2a;
    border-radius: 10px;
  }
  .sb-money-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .sb-money-label { font-size: 11px; color: #7a8a7a; }
  .sb-money-value { font-size: 16px; color: #4ade80; font-weight: 600; }
  .sb-money-value.spent { color: #f87171; }
  .sb-rebate-btn {
    margin-top: 8px;
    width: 100%;
    padding: 6px;
    background: #1a3a1a;
    border: 1px solid #2a5a2a;
    border-radius: 6px;
    color: #4ade80;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
  }
  .sb-rebate-btn:hover { background: #1a4a1a; }
  /* 卡片网格 */
  .sb-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    padding: 0 10px 10px;
  }
  .sb-card {
    background: #22222a;
    border: 1px solid #2e2e36;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .sb-card:hover { border-color: #4a4a55; }
  .sb-card-header { display: flex; align-items: center; margin-bottom: 8px; }
  .sb-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #2e2e36;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    flex-shrink: 0;
    border: 1px solid #3a3a45;
    position: relative;
  }
  .sb-avatar:after {
    content: '+';
    position: absolute;
    bottom: -2px; right: -2px;
    background: #3a3a45;
    width: 14px; height: 14px;
    border-radius: 50%;
    font-size: 10px;
    line-height: 14px;
    text-align: center;
    color: #8a8a95;
  }
  .sb-card.has-avatar .sb-avatar:after { display: none; }
  .sb-name-wrap { margin-left: 8px; overflow: hidden; flex: 1 1 auto; min-width: 0; }
  .sb-name { font-size: 13px; font-weight: 600; color: #e8e8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-alias { font-size: 10px; color: #6a6a75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* 沦陷度条 */
  .sb-fall-bar-wrap { margin-bottom: 4px; }
  .sb-fall-label { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 2px; }
  .sb-fall-stage { color: #8a8a95; }
  .sb-fall-value { color: #6a6a75; }
  .sb-fall-bar {
    height: 4px;
    background: #2a2a30;
    border-radius: 2px;
    overflow: hidden;
  }
  .sb-fall-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }
  .sb-card-footer { font-size: 10px; color: #5a5a65; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-tag {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
    margin-right: 4px;
  }
  .sb-tag-wife { background: #3a2a1a; color: #fbbf24; }
  .sb-tag-daughter { background: #1a2a3a; color: #60a5fa; }
  /* 弹窗：absolute 覆盖 sb-root（iframe 内最稳，不撑高、不截断） */
  .sb-modal-bg {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    padding: 10px;
  }
  .sb-modal-bg.active { display: flex; align-items: center; justify-content: center; }
  .sb-modal {
    background: #1a1a1e;
    border: 1px solid #2e2e36;
    border-radius: 12px;
    max-width: 420px;
    width: 100%;
    max-height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .sb-modal-header {
    display: flex;
    align-items: center;
    padding: 14px;
    border-bottom: 1px solid #2a2a30;
    flex-shrink: 0;
  }
  .sb-modal-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #2e2e36;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    flex-shrink: 0;
    border: 1px solid #3a3a45;
  }
  .sb-modal-title { margin-left: 12px; flex: 1 1 auto; min-width: 0; }
  .sb-modal-name { font-size: 16px; font-weight: 700; }
  .sb-modal-alias { font-size: 12px; color: #7a7a85; }
  .sb-modal-close {
    margin-left: auto;
    background: none; border: none;
    color: #6a6a75; font-size: 20px;
    cursor: pointer; padding: 0 4px;
    flex-shrink: 0;
  }
  .sb-tabs { display: flex; border-bottom: 1px solid #2a2a30; padding: 0 14px; flex-shrink: 0; overflow-x: auto; }
  .sb-tab {
    padding: 8px 12px;
    font-size: 12px;
    color: #6a6a75;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .sb-tab.active { color: #e8e8e8; border-bottom-color: #4ade80; }
  .sb-tab-content { padding: 14px; overflow-y: auto; flex: 1 1 auto; min-height: 0; }
  .sb-tab-pane { display: none; }
  .sb-tab-pane.active { display: block; }
  .sb-field { margin-bottom: 10px; }
  .sb-field-label { font-size: 11px; color: #6a6a75; margin-bottom: 2px; }
  .sb-field-value { font-size: 13px; color: #d8d8d8; word-break: break-word; }
  .sb-field-value.muted { color: #5a5a65; }
  .sb-fall-bar-large { height: 8px; margin: 6px 0; }
  .sb-fall-fill-large { height: 100%; border-radius: 4px; }
  .sb-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .sb-chip {
    background: #2a2a30;
    color: #a8a8b0;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }
  .sb-inner-thought {
    background: #1a1a20;
    border-left: 3px solid #4a4a55;
    padding: 8px 10px;
    margin: 6px 0;
    font-size: 12px;
    color: #9a9aa5;
    font-style: italic;
    border-radius: 0 6px 6px 0;
    word-break: break-word;
  }
  /* 返利弹窗 */
  .rebate-info {
    background: #1a2a1a;
    border: 1px solid #2a4a2a;
    border-radius: 8px;
    padding: 14px;
    font-size: 12px;
    color: #a8c8a8;
    line-height: 1.6;
  }
  .rebate-info b { color: #4ade80; }
  .sb-empty { padding: 20px; text-align: center; color: #5a5a65; font-size: 12px; }
  .sb-loading { padding: 20px; text-align: center; color: #5a5a65; font-size: 12px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="sb-container" id="sb-root">
  <div class="sb-timebar">
    <span class="date" id="sb-date">--</span>
    <span class="period" id="sb-period">--</span>
    <span class="day-count" id="sb-day">第1天</span>
  </div>
  <div class="sb-money">
    <div class="sb-money-row">
      <div>
        <div class="sb-money-label">当前资产</div>
        <div class="sb-money-value" id="sb-asset">¥0</div>
      </div>
      <div style="text-align:right">
        <div class="sb-money-label">给女性花销</div>
        <div class="sb-money-value spent" id="sb-spent">¥0</div>
      </div>
    </div>
    <button class="sb-rebate-btn" id="sb-rebate-btn">💡 十倍返利系统</button>
  </div>
  <div class="sb-cards" id="sb-cards">
    <div class="sb-loading">读取中…</div>
  </div>

  <!-- 详情弹窗（在 sb-root 内，absolute 覆盖） -->
  <div class="sb-modal-bg" id="sb-modal-bg">
    <div class="sb-modal">
      <div class="sb-modal-header">
        <div class="sb-modal-avatar" id="modal-avatar"></div>
        <div class="sb-modal-title">
          <div class="sb-modal-name" id="modal-name"></div>
          <div class="sb-modal-alias" id="modal-alias"></div>
        </div>
        <button class="sb-modal-close" id="modal-close-btn">✕</button>
      </div>
      <div class="sb-tabs" id="modal-tabs"></div>
      <div class="sb-tab-content" id="modal-content"></div>
    </div>
  </div>

  <!-- 返利说明弹窗 -->
  <div class="sb-modal-bg" id="rebate-modal-bg">
    <div class="sb-modal" style="max-width:360px">
      <div class="sb-modal-header">
        <div class="sb-modal-title"><div class="sb-modal-name">💡 十倍返利系统</div></div>
        <button class="sb-modal-close" id="rebate-close-btn">✕</button>
      </div>
      <div class="sb-tab-content">
        <div class="rebate-info">
          <b>规则：</b>给任何女性花钱时，金额×10自动返现到当前资产。<br><br>
          花1万 → 返10万<br>
          花10万 → 返100万<br>
          花100万 → 返1000万<br><br>
          <b>效果：</b>越花越有钱，花钱就是赚钱。王总的资产会随包养开销不断暴涨。
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══ 路径集中表 ═══
const P = {
  时间: '时间',
  日期: '时间.日期',
  星期: '时间.星期',
  时段: '时间.时段',
  天数: '时间.天数计数',
  当前资产: '王总.当前资产',
  花销总额: '王总.给女性花销总额',
  消费记录: '王总.消费记录',
  女人们: '女人们',
  老婆: '老婆',
};
// 沦陷度阶段颜色
const STAGE_COLORS = {
  '公事应付': '#6a6a75',
  '身体诚实': '#a8a8b0',
  '主动迎合': '#60a5fa',
  '欲求不满': '#f59e0b',
  '主动倒贴': '#ec4899',
};

// ═══ 工具函数 ═══
// 路径取值：空串/undefined/null 都回退 default
function g(state, path, def) {
  try {
    const v = _.get(state, path, def);
    return (v === '' || v === undefined || v === null) ? def : v;
  } catch (e) { return def; }
}
// 任意值转数组（治 lodash get 的 null 陷阱）
function asArr(v) {
  if (Array.isArray(v)) return v;
  if (v == null) return [];
  return [v];
}
// 任意值转对象
function asObj(v) {
  return (v && typeof v === 'object' && !Array.isArray(v)) ? v : {};
}
// AI 原文转义（插 innerHTML 前必过）
function esc(s) {
  s = (s == null) ? '' : String(s);
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function fmtMoney(n) {
  n = Number(n) || 0;
  if (n < 0) n = 0;
  if (n >= 100000000) return '¥' + (n / 100000000).toFixed(2) + '亿';
  if (n >= 10000) return '¥' + (n / 10000).toFixed(1) + '万';
  return '¥' + n.toLocaleString();
}
// 取显示串：空值回退默认
function safeStr(v, def) {
  def = (def == null) ? '—' : def;
  if (v == null) return def;
  const s = String(v).trim();
  return s ? s : def;
}

// ═══ 头像 localStorage ═══
function getAvatar(uid) {
  try { return localStorage.getItem('sb_avatar_' + uid) || ''; } catch (e) { return ''; }
}
function setAvatar(uid, dataUrl) {
  try { localStorage.setItem('sb_avatar_' + uid, dataUrl); } catch (e) {}
}
function uploadAvatar(uid, onDone) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      setAvatar(uid, e.target.result);
      if (onDone) onDone(e.target.result);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// ═══ 数据读取（五级降级） ═══
let _state = {};
async function loadData() {
  try { await waitGlobalInitialized('Mvu'); } catch (e) {}
  try { await waitUntil(() => _.has(getVariables({ type: 'message' }), 'stat_data')); } catch (e) {}
  let stat = null;
  try { stat = Mvu.getMvuData({ type: 'message', message_id: getCurrentMessageId() }); } catch (e) {}
  if (!stat) {
    try { stat = Mvu.getMvuData('latest'); } catch (e) {}
  }
  if (!stat) {
    try { stat = getVariables({ type: 'message', message_id: 'latest' }).stat_data; } catch (e) {}
  }
  if (!stat) {
    try { stat = getVariables({ type: 'message' }).stat_data; } catch (e) {}
  }
  if (!stat) {
    try { stat = getVariables({}).stat_data; } catch (e) {}
  }
  _state = asObj(stat);
  return _state;
}

// ═══ 渲染 ═══
function render() {
  const s = _state;
  // 时间
  document.getElementById('sb-date').textContent = safeStr(g(s, P.日期, ''), '--') + ' ' + safeStr(g(s, P.星期, ''), '');
  document.getElementById('sb-period').textContent = safeStr(g(s, P.时段, ''), '--');
  const dayNum = Number(g(s, P.天数, 1)) || 1;
  document.getElementById('sb-day').textContent = '第' + dayNum + '天';
  // 资产
  document.getElementById('sb-asset').textContent = fmtMoney(g(s, P.当前资产, 0));
  document.getElementById('sb-spent').textContent = fmtMoney(g(s, P.花销总额, 0));
  // 卡片
  const cardsEl = document.getElementById('sb-cards');
  cardsEl.innerHTML = '';
  let count = 0;
  const women = asObj(g(s, P.女人们, {}));
  const wife = asObj(g(s, P.老婆, null));
  // 情妇+女儿卡片（都在 /女人们 字典里，女儿 UID 固定 "daughter"）
  for (const uid in women) {
    if (!Object.prototype.hasOwnProperty.call(women, uid)) continue;
    const w = asObj(women[uid]);
    const info = asObj(w.基本信息);
    if (!info.姓名) continue;
    const type = (uid === 'daughter') ? 'daughter' : 'concubine';
    cardsEl.appendChild(buildCard(uid, w, type));
    count++;
  }
  // 老婆卡片
  const wInfo = asObj(wife.基本信息);
  if (wInfo.姓名) {
    cardsEl.appendChild(buildCard('wife', wife, 'wife'));
    count++;
  }
  if (count === 0) {
    cardsEl.innerHTML = '<div class="sb-empty">暂无女性档案</div>';
  }
}

function buildCard(uid, data, type) {
  const info = asObj(data.基本信息);
  const avatar = getAvatar(uid);
  const card = document.createElement('div');
  card.className = 'sb-card' + (avatar ? ' has-avatar' : '');
  const name = safeStr(info.姓名, '未命名');
  const alias = safeStr(info.网名, '');
  let tagHtml = '';
  let fallHtml = '';
  const status = asObj(data.当前状态);
  const footer = safeStr(status.位置, '位置未知');
  if (type === 'wife') {
    tagHtml = '<span class="sb-tag sb-tag-wife">正室</span>';
  } else if (type === 'daughter') {
    tagHtml = '<span class="sb-tag sb-tag-daughter">女儿</span>';
  }
  if (type === 'concubine') {
    const fall = asObj(data.沦陷度);
    const fallVal = Number(fall.当前值) || 0;
    const stage = safeStr(fall.阶段, '公事应付');
    const color = STAGE_COLORS[stage] || '#6a6a75';
    fallHtml = '<div class="sb-fall-bar-wrap">' +
      '<div class="sb-fall-label"><span class="sb-fall-stage">' + esc(stage) + '</span><span class="sb-fall-value">' + fallVal + '</span></div>' +
      '<div class="sb-fall-bar"><div class="sb-fall-fill" style="width:' + fallVal + '%;background:' + color + '"></div></div>' +
    '</div>';
  }
  card.innerHTML =
    '<div class="sb-card-header">' +
      '<div class="sb-avatar" style="' + (avatar ? 'background-image:url(\'' + avatar.replace(/'/g, "\\'") + '\')' : '') + '"></div>' +
      '<div class="sb-name-wrap">' + tagHtml +
        '<div class="sb-name">' + esc(name) + '</div>' +
        (alias && alias !== '—' ? '<div class="sb-alias">(' + esc(alias) + ')</div>' : '') +
      '</div>' +
    '</div>' + fallHtml +
    '<div class="sb-card-footer">' + esc(footer) + '</div>';
  card.addEventListener('click', function (e) {
    if (e.target.classList.contains('sb-avatar')) {
      e.stopPropagation();
      uploadAvatar(uid, function (newAvatar) {
        e.target.style.backgroundImage = "url('" + newAvatar.replace(/'/g, "\\'") + "')";
        card.classList.add('has-avatar');
      });
      return;
    }
    openModal(uid, data, type);
  });
  return card;
}

// ═══ 详情弹窗 ═══
function openModal(uid, data, type) {
  const info = asObj(data.基本信息);
  const avatar = getAvatar(uid);
  const avatarEl = document.getElementById('modal-avatar');
  avatarEl.style.backgroundImage = avatar ? "url('" + avatar.replace(/'/g, "\\'") + "')" : '';
  avatarEl.onclick = function () {
    uploadAvatar(uid, function (newAvatar) {
      avatarEl.style.backgroundImage = "url('" + newAvatar.replace(/'/g, "\\'") + "')";
    });
  };
  document.getElementById('modal-name').textContent = safeStr(info.姓名, '未命名');
  const alias = safeStr(info.网名, '');
  document.getElementById('modal-alias').textContent = (alias && alias !== '—') ? '(' + alias + ')' : '';

  // Tab定义
  const tabs = [];
  tabs.push({ id: 'basic', name: '基本信息' });
  if (type === 'concubine') {
    tabs.push({ id: 'fall', name: '沦陷度' });
    tabs.push({ id: 'nsfw', name: 'NSFW' });
  } else if (type === 'wife') {
    tabs.push({ id: 'nsfw', name: 'NSFW' });
  } else if (type === 'daughter') {
    tabs.push({ id: 'fall', name: '沦陷度' });
    tabs.push({ id: 'nsfw', name: 'NSFW' });
  }
  tabs.push({ id: 'status', name: '当前状态' });

  const tabsEl = document.getElementById('modal-tabs');
  tabsEl.innerHTML = '';
  tabs.forEach(function (t, i) {
    const tab = document.createElement('div');
    tab.className = 'sb-tab' + (i === 0 ? ' active' : '');
    tab.textContent = t.name;
    tab.addEventListener('click', function () {
      document.querySelectorAll('.sb-tab').forEach(function (x) { x.classList.remove('active'); });
      document.querySelectorAll('.sb-tab-pane').forEach(function (x) { x.classList.remove('active'); });
      tab.classList.add('active');
      const pane = document.getElementById('pane-' + t.id);
      if (pane) pane.classList.add('active');
    });
    tabsEl.appendChild(tab);
  });

  const contentEl = document.getElementById('modal-content');
  contentEl.innerHTML = '';

  // 基本信息
  let basicHtml = '<div class="sb-tab-pane active" id="pane-basic">' +
    field('身份', info.身份) +
    field('年龄', info.年龄 ? (Number(info.年龄) || 0) + '岁' : '') +
    field('网名', info.网名) +
  '</div>';
  contentEl.insertAdjacentHTML('beforeend', basicHtml);

  // 沦陷度
  if ((type === 'concubine' || type === 'daughter') && data.沦陷度) {
    const fall = asObj(data.沦陷度);
    const fallVal = Number(fall.当前值) || 0;
    const stage = safeStr(fall.阶段, '公事应付');
    const color = STAGE_COLORS[stage] || '#6a6a75';
    const thought = safeStr(data.内心想法, '');
    const fallHtml = '<div class="sb-tab-pane" id="pane-fall">' +
      field('当前值', fallVal + ' / 100') +
      '<div class="sb-fall-bar sb-fall-bar-large"><div class="sb-fall-fill sb-fall-fill-large" style="width:' + fallVal + '%;background:' + color + '"></div></div>' +
      field('阶段', stage, color) +
      field('做爱次数', Number(fall.做爱次数) || 0) +
      field('高潮次数', Number(fall.高潮次数) || 0) +
      field('当轮高潮', (Number(fall.本轮高潮数) || 0) + ' / ' + (Number(fall.高潮上限) || 5)) +
      (thought && thought !== '—' ? '<div class="sb-field"><div class="sb-field-label">内心想法</div><div class="sb-inner-thought">' + esc(thought) + '</div></div>' : '') +
    '</div>';
    contentEl.insertAdjacentHTML('beforeend', fallHtml);
  }

  // NSFW
  if (data.NSFW) {
    const nsfw = asObj(data.NSFW);
    const nsfwHtml = '<div class="sb-tab-pane" id="pane-nsfw">' +
      chipField('敏感点', asArr(nsfw.敏感点)) +
      chipField('已解锁姿势', asArr(nsfw.已解锁姿势)) +
      chipField('特殊癖好', asArr(nsfw.特殊癖好)) +
    '</div>';
    contentEl.insertAdjacentHTML('beforeend', nsfwHtml);
  }

  // 当前状态 + 花销
  const st = asObj(data.当前状态);
  let statusHtml = '<div class="sb-tab-pane" id="pane-status">' +
    field('位置', st.位置) +
    field('着装', st.着装) +
    field('身体状态', st.身体状态) +
  '</div>';
  if (data.花销) {
    const sp = asObj(data.花销);
    statusHtml += '<div style="margin-top:14px;border-top:1px solid #2a2a30;padding-top:10px">' +
      field('累计花费', fmtMoney(sp.累计花费)) +
      field('最近大礼', sp.最近大礼) +
    '</div>';
  }
  contentEl.insertAdjacentHTML('beforeend', statusHtml);

  document.getElementById('sb-modal-bg').classList.add('active');
}

// 字段行（value 为 AI 文本，走 esc）
function field(label, value, color) {
  const v = safeStr(value, '');
  const valHtml = v && v !== '—'
    ? '<div class="sb-field-value">' + (color ? '<span style="color:' + color + '">' + esc(v) + '</span>' : esc(v)) + '</div>'
    : '<div class="sb-field-value muted">—</div>';
  return '<div class="sb-field"><div class="sb-field-label">' + esc(label) + '</div>' + valHtml + '</div>';
}
// chip 字段（每个标签 esc）
function chipField(label, arr) {
  if (!arr || !arr.length) return field(label, '');
  const chips = arr.map(function (c) { return '<span class="sb-chip">' + esc(safeStr(c, '')) + '</span>'; }).join('');
  return '<div class="sb-field"><div class="sb-field-label">' + esc(label) + '</div><div class="sb-chips">' + chips + '</div></div>';
}

// ═══ 弹窗开关（挂 window，供 inline/事件调用） ═══
function closeModal(e) {
  if (e && e.target && e.target.id !== 'sb-modal-bg') return;
  document.getElementById('sb-modal-bg').classList.remove('active');
}
function showRebate() { document.getElementById('rebate-modal-bg').classList.add('active'); }
function closeRebate(e) {
  if (e && e.target && e.target.id !== 'rebate-modal-bg') return;
  document.getElementById('rebate-modal-bg').classList.remove('active');
}
// 挂全局
window.closeModal = closeModal;
window.showRebate = showRebate;
window.closeRebate = closeRebate;

// ═══ 事件绑定（静态骨架，绑一次） ═══
function bindStatic() {
  // 返利按钮
  document.getElementById('sb-rebate-btn').addEventListener('click', showRebate);
  // 详情弹窗：点背景关闭
  document.getElementById('sb-modal-bg').addEventListener('click', closeModal);
  document.getElementById('modal-close-btn').addEventListener('click', function () { closeModal(); });
  // 返利弹窗：点背景关闭
  document.getElementById('rebate-modal-bg').addEventListener('click', closeRebate);
  document.getElementById('rebate-close-btn').addEventListener('click', function () { closeRebate(); });
}

// ═══ 初始化与刷新 ═══
let _refreshing = false;
async function refresh() {
  if (_refreshing) return;
  _refreshing = true;
  try {
    await loadData();
    render();
  } catch (e) {}
  _refreshing = false;
}

async function init() {
  bindStatic();
  await loadData();
  render();
  try {
    eventOn(tavern_events.MESSAGE_UPDATED, function () {
      if (_refreshing) return;
      _refreshing = true;
      setTimeout(async function () {
        try { await loadData(); render(); } catch (e) {}
        _refreshing = false;
      }, 300);
    });
    eventOn(tavern_events.MESSAGE_RECEIVED, function () {
      if (_refreshing) return;
      _refreshing = true;
      setTimeout(async function () {
        try { await loadData(); render(); } catch (e) {}
        _refreshing = false;
      }, 1000);
    });
  } catch (e) {}
}

// 启动：jQuery ready（禁 DOMContentLoaded——远程 load 不触发），errorCatched 包住防白屏
$(errorCatched(init));
$(window).on('pagehide', function () {});
</script>
</body>
</html>
